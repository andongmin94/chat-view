<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatView Overlay</title>
    <style>
      :root {
        --resize-border: 12px;
        --overlay-bg: rgba(70, 130, 180, 0.7);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        position: relative;
        overflow: hidden;
        background: var(--overlay-bg);
        transition: background-color 0.2s ease;
      }

      body.fixed {
        background: rgba(0, 0, 0, 0);
      }

      #dragRegion {
        position: absolute;
        top: var(--resize-border);
        left: var(--resize-border);
        right: var(--resize-border);
        bottom: var(--resize-border);
        overflow: hidden;
      }

      #chatFrame {
        position: absolute;
        top: 0;
        left: 0;
        width: 100000px;
        min-width: 100000px;
        max-width: none;
        height: 100%;
        border: 0;
        background: transparent;
        pointer-events: none;
      }

      #dragLayer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 15;
        background: transparent;
        cursor: move;
      }

      body.fixed #dragLayer {
        display: none;
      }

      .resizeHandle {
        position: absolute;
        z-index: 20;
      }

      .resizeHandle[data-direction="n"] {
        top: 0;
        left: var(--resize-border);
        right: var(--resize-border);
        height: var(--resize-border);
        cursor: ns-resize;
      }

      .resizeHandle[data-direction="s"] {
        bottom: 0;
        left: var(--resize-border);
        right: var(--resize-border);
        height: var(--resize-border);
        cursor: ns-resize;
      }

      .resizeHandle[data-direction="w"] {
        top: var(--resize-border);
        left: 0;
        bottom: var(--resize-border);
        width: var(--resize-border);
        cursor: ew-resize;
      }

      .resizeHandle[data-direction="e"] {
        top: var(--resize-border);
        right: 0;
        bottom: var(--resize-border);
        width: var(--resize-border);
        cursor: ew-resize;
      }

      .resizeHandle[data-direction="nw"] {
        top: 0;
        left: 0;
        width: var(--resize-border);
        height: var(--resize-border);
        cursor: nwse-resize;
      }

      .resizeHandle[data-direction="ne"] {
        top: 0;
        right: 0;
        width: var(--resize-border);
        height: var(--resize-border);
        cursor: nesw-resize;
      }

      .resizeHandle[data-direction="sw"] {
        bottom: 0;
        left: 0;
        width: var(--resize-border);
        height: var(--resize-border);
        cursor: nesw-resize;
      }

      .resizeHandle[data-direction="se"] {
        right: 0;
        bottom: 0;
        width: var(--resize-border);
        height: var(--resize-border);
        cursor: nwse-resize;
      }

      body.fixed .resizeHandle {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="dragRegion">
      <iframe
        id="chatFrame"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>
    <div id="dragLayer"></div>

    <div class="resizeHandle" data-direction="n"></div>
    <div class="resizeHandle" data-direction="e"></div>
    <div class="resizeHandle" data-direction="s"></div>
    <div class="resizeHandle" data-direction="w"></div>
    <div class="resizeHandle" data-direction="ne"></div>
    <div class="resizeHandle" data-direction="nw"></div>
    <div class="resizeHandle" data-direction="se"></div>
    <div class="resizeHandle" data-direction="sw"></div>

    <script>
      (() => {
        const invoke = window.__TAURI_INTERNALS__?.invoke;
        const body = document.body;
        const frame = document.getElementById("chatFrame");
        const dragLayer = document.getElementById("dragLayer");
        const MIN_WIDTH = 140;
        const MIN_HEIGHT = 120;

        if (!invoke || !body || !frame || !dragLayer) {
          return;
        }

        const setFixedMode = (fixed) => {
          body.classList.toggle("fixed", Boolean(fixed));
        };

        window.__chatviewSetFixedMode = setFixedMode;

        const startDragging = async () => {
          try {
            await invoke("plugin:window|start_dragging", { label: "overlay" });
          } catch (_error) {
            // ignore
          }
        };

        dragLayer.addEventListener("pointerdown", (event) => {
          if (event.button !== 0 || body.classList.contains("fixed")) {
            return;
          }
          event.preventDefault();
          void startDragging();
        });

        const setupResizeHandles = () => {
          document.querySelectorAll(".resizeHandle").forEach((handle) => {
            handle.addEventListener("pointerdown", async (event) => {
              if (event.button !== 0 || body.classList.contains("fixed")) {
                return;
              }

              const direction = handle.dataset.direction;
              if (!direction) {
                return;
              }

              event.preventDefault();
              handle.setPointerCapture(event.pointerId);

              let startBounds;
              try {
                startBounds = await invoke("overlay_get_bounds");
              } catch (_error) {
                handle.releasePointerCapture(event.pointerId);
                return;
              }

              if (!startBounds) {
                handle.releasePointerCapture(event.pointerId);
                return;
              }

              const startX = event.screenX;
              const startY = event.screenY;

              const onPointerMove = (moveEvent) => {
                const deltaX = moveEvent.screenX - startX;
                const deltaY = moveEvent.screenY - startY;

                let x = startBounds.x;
                let y = startBounds.y;
                let width = startBounds.width;
                let height = startBounds.height;

                if (direction.includes("e")) {
                  width = Math.max(MIN_WIDTH, startBounds.width + deltaX);
                }
                if (direction.includes("s")) {
                  height = Math.max(MIN_HEIGHT, startBounds.height + deltaY);
                }
                if (direction.includes("w")) {
                  const nextWidth = Math.max(MIN_WIDTH, startBounds.width - deltaX);
                  x = startBounds.x + (startBounds.width - nextWidth);
                  width = nextWidth;
                }
                if (direction.includes("n")) {
                  const nextHeight = Math.max(MIN_HEIGHT, startBounds.height - deltaY);
                  y = startBounds.y + (startBounds.height - nextHeight);
                  height = nextHeight;
                }

                void invoke("overlay_set_bounds", {
                  payload: { x, y, width, height },
                });
              };

              const onPointerUp = (endEvent) => {
                if (handle.hasPointerCapture(endEvent.pointerId)) {
                  handle.releasePointerCapture(endEvent.pointerId);
                }
                handle.removeEventListener("pointermove", onPointerMove);
                handle.removeEventListener("pointerup", onPointerUp);
                handle.removeEventListener("pointercancel", onPointerUp);
              };

              handle.addEventListener("pointermove", onPointerMove);
              handle.addEventListener("pointerup", onPointerUp);
              handle.addEventListener("pointercancel", onPointerUp);
            });
          });
        };

        const bootstrap = async () => {
          try {
            const payload = await invoke("overlay_bootstrap");
            if (payload && typeof payload.url === "string") {
              frame.src = payload.url;
            }
            setFixedMode(Boolean(payload?.isFixed));
          } catch (_error) {
            // ignore
          }
        };

        setupResizeHandles();
        void bootstrap();
      })();
    </script>
  </body>
</html>
